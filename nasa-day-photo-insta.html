<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The photo NASA took on your special day</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --accent: #c2a0ff; --deep: #050510; }

  body {
    background: var(--deep); color: #fff;
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh; overflow-x: hidden;
  }

  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .stars::before, .stars::after {
    content: ''; position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, white 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, white 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 8%, white 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 60%, white 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 20%, white 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 80% 75%, white 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 35%, white 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 80%, white 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 90%, white 0%, transparent 100%),
      radial-gradient(2px 2px at 60% 45%, rgba(194,160,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 55%, white 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 55%, white 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 70%, white 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 85% 10%, rgba(194,160,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 95% 90%, white 0%, transparent 100%);
  }
  .stars::after { transform: rotate(30deg) scale(1.5); opacity: 0.4; }

  main {
    position: relative; z-index: 1; min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 40px 20px;
  }

  /* SCREEN 1 */
  #screen-intro {
    text-align: center; animation: fadeUp 1s ease both;
    width: 100%; max-width: 520px;
  }
  .eyebrow {
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 28px; opacity: 0.8;
  }
  h1 {
    font-size: clamp(2.2rem, 7vw, 4.5rem); font-weight: 300;
    line-height: 1.1; letter-spacing: -0.01em; margin-bottom: 12px;
  }
  h1 em { font-style: italic; color: var(--accent); }
  .subtitle {
    font-size: 1.1rem; font-weight: 300; opacity: 0.5;
    margin-bottom: 44px; font-style: italic;
  }
  .occasion-label {
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 0.25em; text-transform: uppercase;
    opacity: 0.5; margin-bottom: 14px;
  }
  .pills {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; margin-bottom: 32px;
  }
  .pill {
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 0.15em; text-transform: uppercase;
    padding: 8px 16px; border: 1px solid rgba(194,160,255,0.25);
    color: rgba(255,255,255,0.45); cursor: pointer;
    border-radius: 100px; transition: all 0.25s; background: transparent;
  }
  .pill:hover, .pill.active {
    border-color: var(--accent); color: #fff;
    background: rgba(194,160,255,0.1);
  }
  .date-input-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }
  .date-label {
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 0.25em; text-transform: uppercase; opacity: 0.5;
  }
  input[type="date"] {
    background: transparent; border: none;
    border-bottom: 1px solid rgba(194,160,255,0.4);
    color: #fff; font-family: 'Space Mono', monospace;
    font-size: 1.4rem; letter-spacing: 0.1em; padding: 8px 4px;
    outline: none; text-align: center; cursor: pointer;
    width: 220px; transition: border-color 0.3s; color-scheme: dark;
  }
  input[type="date"]:focus { border-color: var(--accent); }
  .btn {
    margin-top: 8px; background: transparent;
    border: 1px solid rgba(194,160,255,0.5); color: #fff;
    font-family: 'Space Mono', monospace; font-size: 11px;
    letter-spacing: 0.2em; text-transform: uppercase;
    padding: 14px 36px; cursor: pointer; transition: all 0.3s;
    position: relative; overflow: hidden;
  }
  .btn::after {
    content: ''; position: absolute; inset: 0;
    background: var(--accent); opacity: 0; transition: opacity 0.3s;
  }
  .btn:hover { border-color: var(--accent); color: var(--deep); }
  .btn:hover::after { opacity: 1; }
  .btn span { position: relative; z-index: 1; }

  /* SCREEN 2 */
  #screen-loading { text-align: center; display: none; }
  .orbit {
    width: 60px; height: 60px;
    border: 1px solid rgba(194,160,255,0.3);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 1.2s linear infinite; margin: 0 auto 32px;
  }
  .loading-text { font-size: 1rem; font-style: italic; opacity: 0.5; animation: pulse 2s ease infinite; }

  /* SCREEN 3 */
  #screen-result {
    display: none; width: 100%; max-width: 680px;
    animation: fadeUp 0.8s ease both;
  }
  .result-date {
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--accent); opacity: 0.7; margin-bottom: 8px; text-align: center;
  }
  .result-occasion {
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 0.2em; text-transform: uppercase;
    opacity: 0.35; text-align: center; margin-bottom: 20px;
  }
  .result-title {
    font-size: clamp(1.4rem, 4vw, 2.2rem); font-weight: 300;
    line-height: 1.2; text-align: center; margin-bottom: 28px; font-style: italic;
  }
  .media-wrap {
    width: 100%; border-radius: 2px; overflow: hidden;
    position: relative; margin-bottom: 24px;
    background: rgba(194,160,255,0.05); min-height: 300px;
    display: flex; align-items: center; justify-content: center;
  }
  .media-wrap img { width: 100%; display: block; object-fit: cover; }
  .media-wrap iframe { width: 100%; aspect-ratio: 16/9; border: none; }
  .video-notice {
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 0.15em; opacity: 0.4; text-align: center;
    margin-bottom: 24px; text-transform: uppercase;
  }
  .explanation {
    font-size: 1rem; line-height: 1.75; opacity: 0.65;
    font-weight: 300; margin-bottom: 20px; padding: 0 8px;
  }
  .copyright-line {
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 0.15em; opacity: 0.3; text-transform: uppercase;
    text-align: center; margin-bottom: 28px;
  }

  /* Order section */
  .order-section {
    margin-bottom: 32px;
  }
  .order-title {
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--accent); opacity: 0.7; text-align: center;
    margin-bottom: 16px;
  }

  /* Copyright notice above cards */
  .copyright-notice {
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 0.12em; text-transform: uppercase;
    opacity: 0.4; text-align: center; margin-bottom: 16px;
    padding: 10px 16px;
    border: 1px solid rgba(194,160,255,0.15);
    background: rgba(194,160,255,0.04);
    line-height: 1.7;
  }
  .copyright-notice a {
    color: var(--accent); text-decoration: none; opacity: 0.9;
  }

  .order-cards {
    display: flex; flex-direction: column; gap: 10px;
  }

  .order-card {
    border: 1px solid rgba(255,255,255,0.1);
    padding: 18px 20px;
    display: flex; align-items: center;
    justify-content: space-between; gap: 16px;
    transition: border-color 0.3s;
    background: rgba(255,255,255,0.02);
  }
  .order-card:hover { border-color: rgba(194,160,255,0.3); }

  .card-info { flex: 1; }
  .card-name {
    font-size: 1.1rem; font-weight: 300; margin-bottom: 4px;
  }
  .card-desc {
    font-family: 'Space Mono', monospace; font-size: 8px;
    letter-spacing: 0.12em; text-transform: uppercase;
    opacity: 0.35; line-height: 1.6;
  }
  .card-price {
    font-family: 'Space Mono', monospace; font-size: 1rem;
    letter-spacing: 0.05em; color: var(--accent);
    white-space: nowrap; margin-right: 16px;
  }

  /* Order button — active */
  .btn-order {
    display: inline-flex; align-items: center; gap: 6px;
    background: transparent;
    border: 1px solid rgba(194,160,255,0.6); color: #fff;
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 0.15em; text-transform: uppercase;
    padding: 10px 18px; cursor: pointer;
    text-decoration: none; transition: all 0.3s;
    position: relative; overflow: hidden; white-space: nowrap;
  }
  .btn-order::after {
    content: ''; position: absolute; inset: 0;
    background: var(--accent); opacity: 0; transition: opacity 0.3s;
  }
  .btn-order:hover { color: var(--deep); }
  .btn-order:hover::after { opacity: 1; }
  .btn-order span { position: relative; z-index: 1; }

  /* Order button — copyright/notify */
  .btn-notify-ig {
    display: inline-flex; align-items: center; gap: 6px;
    background: transparent;
    border: 1px solid rgba(194,160,255,0.3);
    color: rgba(255,255,255,0.5);
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 0.15em; text-transform: uppercase;
    padding: 10px 18px; cursor: pointer;
    text-decoration: none; transition: all 0.3s;
    position: relative; overflow: hidden; white-space: nowrap;
  }
  .btn-notify-ig::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
    opacity: 0; transition: opacity 0.3s;
  }
  .btn-notify-ig:hover { color: #fff; }
  .btn-notify-ig:hover::after { opacity: 1; }
  .btn-notify-ig span { position: relative; z-index: 1; display: flex; align-items: center; gap: 6px; }
  .notify-badge {
    font-size: 7px; letter-spacing: 0.08em;
    background: rgba(194,160,255,0.15); color: var(--accent);
    padding: 2px 5px; border-radius: 100px;
  }

  .actions {
    display: flex; gap: 12px; justify-content: center;
    flex-wrap: wrap; margin-bottom: 40px;
  }
  .btn-ghost {
    background: transparent; border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.6); font-family: 'Space Mono', monospace;
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    padding: 12px 24px; cursor: pointer; transition: all 0.3s;
    text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-ghost:hover { border-color: rgba(255,255,255,0.5); color: #fff; }

  .legal {
    font-family: 'Space Mono', monospace; font-size: 8px;
    letter-spacing: 0.1em; opacity: 0.2; text-align: center;
    padding: 0 8px 20px; line-height: 1.8;
  }

  .error-msg {
    text-align: center; font-style: italic; opacity: 0.5;
    font-size: 1rem; padding: 60px 20px;
  }
  .error-msg span {
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 0.2em; display: block; margin-bottom: 16px; color: var(--accent);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.8; } }

  .corner { position: fixed; width: 40px; height: 40px; opacity: 0.2; pointer-events: none; z-index: 2; }
  .corner::before, .corner::after { content: ''; position: absolute; background: var(--accent); }
  .corner::before { width: 1px; height: 100%; }
  .corner::after { width: 100%; height: 1px; }
  .corner-tl { top: 20px; left: 20px; }
  .corner-tr { top: 20px; right: 20px; transform: scaleX(-1); }
  .corner-bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
  .corner-br { bottom: 20px; right: 20px; transform: scale(-1); }

  @media (max-width: 480px) {
    .order-card { flex-wrap: wrap; }
    .card-price { margin-right: 0; }
  }
</style>
</head>
<body>

<div class="stars"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<main>

  <!-- SCREEN 1 -->
  <div id="screen-intro">
    <p class="eyebrow">NASA · Astronomy Picture of the Day</p>
    <h1>The photo NASA took<br>on <em>your special day</em></h1>
    <p class="subtitle">Every day since June 16, 1995, NASA has published one image of the cosmos.</p>
    <p class="occasion-label">What's the occasion?</p>
    <div class="pills">
      <button class="pill active" data-occasion="Birthday">🎂 Birthday</button>
      <button class="pill" data-occasion="Wedding">💍 Wedding</button>
      <button class="pill" data-occasion="First meeting">💑 First meeting</button>
      <button class="pill" data-occasion="Birth of a child">👶 Birth of a child</button>
      <button class="pill" data-occasion="Graduation">🎓 Graduation</button>
      <button class="pill" data-occasion="Special day">✨ Other</button>
    </div>
    <div class="date-input-wrap">
      <label class="date-label" for="birthday">Enter the date</label>
      <input type="date" id="birthday" min="1995-06-16" max="2025-12-31" />
      <button class="btn" onclick="fetchNASA()"><span>Reveal my photo →</span></button>
    </div>
  </div>

  <!-- SCREEN 2 -->
  <div id="screen-loading">
    <div class="orbit"></div>
    <p class="loading-text">Travelling back in time…</p>
  </div>

  <!-- SCREEN 3 -->
  <div id="screen-result"></div>

</main>

<script>
const NASA_KEY = 'DEMO_KEY';
const IG_URL = 'https://www.instagram.com/moonzshadow_';
let selectedOccasion = 'Birthday';

document.querySelectorAll('.pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    selectedOccasion = pill.dataset.occasion;
  });
});

function show(id) {
  ['screen-intro','screen-loading','screen-result'].forEach(s => {
    document.getElementById(s).style.display = s === id ? 'block' : 'none';
  });
}

function formatDisplayDate(dateStr) {
  const [y, m, d] = dateStr.split('-');
  const months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  return `${months[parseInt(m)-1]} ${parseInt(d)}, ${y}`;
}

async function fetchNASA() {
  const input = document.getElementById('birthday');
  const dateVal = input.value;
  if (!dateVal) {
    input.style.borderColor = 'rgba(255,100,100,0.6)';
    setTimeout(() => input.style.borderColor = 'rgba(194,160,255,0.4)', 1500);
    return;
  }
  show('screen-loading');
  try {
    const url = `https://api.nasa.gov/planetary/apod?date=${dateVal}&api_key=${NASA_KEY}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    renderResult(data, dateVal);
  } catch(e) { renderError(); }
}

const igIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>`;

function orderButton(hasCopyright) {
  if (hasCopyright) {
    return `<a href="${IG_URL}" target="_blank" class="btn-notify-ig">
      <span>${igIcon} Notify me <span class="notify-badge">COMING SOON</span></span>
    </a>`;
  }
  return `<a href="${IG_URL}" target="_blank" class="btn-order">
    <span>Order via DM →</span>
  </a>`;
}

function renderResult(data, dateStr) {
  const wrap = document.getElementById('screen-result');
  const isVideo = data.media_type === 'video';
  const hasCopyright = !!data.copyright;

  let mediaHTML = '';
  if (isVideo) {
    const embedUrl = data.url.includes('youtube') || data.url.includes('youtu.be')
      ? data.url.replace('watch?v=', 'embed/').replace('youtu.be/', 'youtube.com/embed/')
      : data.url;
    mediaHTML = `<div class="media-wrap"><iframe src="${embedUrl}" allowfullscreen></iframe></div>
      <p class="video-notice">NASA published a video on this day</p>`;
  } else {
    const imgSrc = data.hdurl || data.url;
    mediaHTML = `<div class="media-wrap"><img src="${imgSrc}" alt="${data.title}" loading="lazy"/></div>`;
  }

  const copyrightLine = hasCopyright
    ? `<p class="copyright-line">Image credit: ${data.copyright.replace(/\n/g, ' ')}</p>`
    : '';

  const shortExplanation = data.explanation.length > 400
    ? data.explanation.slice(0, 400).replace(/\s\S+$/, '') + '…'
    : data.explanation;

  const copyrightNotice = hasCopyright ? `
    <div class="copyright-notice">
      This image is protected by a photographer's copyright.<br>
      Print orders coming soon — <a href="${IG_URL}" target="_blank">DM @moonzshadow_</a> to be notified.
    </div>` : '';

  const products = [
    {
      name: 'Digital download',
      desc: 'High resolution file · Print at home · Instant delivery',
      price: '4.99€'
    },
    {
      name: 'Fine art print',
      desc: 'Premium paper · Shipped worldwide · No frame',
      price: '29.99€'
    },
    {
      name: 'Framed print',
      desc: 'Premium paper · Wooden frame · Shipped worldwide',
      price: '59.99€'
    }
  ];

  const cardsHTML = products.map(p => `
    <div class="order-card">
      <div class="card-info">
        <div class="card-name">${p.name}</div>
        <div class="card-desc">${p.desc}</div>
      </div>
      <div class="card-price">${p.price}</div>
      ${orderButton(hasCopyright)}
    </div>
  `).join('');

  wrap.innerHTML = `
    <p class="result-date">${formatDisplayDate(dateStr)}</p>
    <p class="result-occasion">${selectedOccasion}</p>
    <h2 class="result-title">${data.title}</h2>
    ${mediaHTML}
    <p class="explanation">${shortExplanation}</p>
    ${copyrightLine}
    <div class="order-section">
      <p class="order-title">🖼 &nbsp; Order this image</p>
      <div class="copyright-notice">
        To order, send a DM with your date — each print is checked and prepared by hand.<br>
        <a href="${IG_URL}" target="_blank">Order via @moonzshadow_</a>
      </div>
      ${copyrightNotice}
      <div class="order-cards">${cardsHTML}</div>
    </div>
    <div class="actions">
      ${!isVideo ? `<a href="${data.hdurl || data.url}" target="_blank" class="btn-ghost">↗ Full resolution</a>` : ''}
      <button class="btn-ghost" onclick="resetApp()">← Another date</button>
    </div>
    <p class="legal">Images courtesy of NASA / APOD — nasa.gov · Some images may be subject to third-party copyright · This site is not affiliated with or endorsed by NASA.</p>
  `;

  show('screen-result');
}

function renderError() {
  const wrap = document.getElementById('screen-result');
  wrap.innerHTML = `
    <div class="error-msg">
      <span>No image found</span>
      NASA doesn't have an image for this exact date.<br>
      Try a date between June 16, 1995 and today.
      <br><br>
      <button class="btn-ghost" onclick="resetApp()">← Try again</button>
    </div>
  `;
  show('screen-result');
}

function resetApp() { show('screen-intro'); }
</script>
</body>
</html>
